<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Your Trip — SafarSathi4U</title>
  <link rel="stylesheet" href="safarsathi.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <style>
    .booking-hero {
      height: 55vh; position:relative; display:flex; align-items:center; justify-content:center;
      background: url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=1400') center/cover;
    }
    .booking-hero::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    .booking-hero h1 { font-family:'Playfair Display',serif; font-size:3.5rem; color:#fff; position:relative; z-index:1; text-shadow:0 4px 16px rgba(0,0,0,0.5); }

    #booking { background:#f7f7f7; padding:5rem 2rem; }
    .booking-container { max-width:760px; margin:0 auto; }
    .section-title { text-align:center; font-family:'Playfair Display',serif; font-size:2.4rem; color:#203a43; margin-bottom:2rem; }

    form {
      background:#fff; padding:3rem; border-radius:12px;
      box-shadow:0 6px 24px rgba(0,0,0,0.1);
    }
    .form-group { margin-bottom:1.4rem; }
    label { display:block; font-size:0.95rem; color:#203a43; font-weight:600; margin-bottom:6px; }
    input, select {
      width:100%; padding:12px 14px; font-size:0.95rem;
      border:1px solid #ddd; border-radius:8px;
      transition:border-color 0.3s; outline:none;
    }
    input:focus, select:focus { border-color:#004d40; }
    .btn {
      width:100%; background:#004d40; color:#fff;
      padding:14px; font-size:1.05rem; font-weight:700;
      border:none; border-radius:8px; cursor:pointer;
      transition:background 0.2s, transform 0.2s; margin-top:0.5rem;
    }
    .btn:hover { background:#006652; transform:translateY(-2px); }

    .contact-strip {
      background:#1a3c34; color:#fff; padding:3rem 2rem; text-align:center;
    }
    .contact-strip h2 { font-family:'Playfair Display',serif; font-size:2rem; margin-bottom:1rem; }
    .contact-strip p { font-size:1.05rem; color:rgba(255,255,255,0.8); margin-bottom:0.5rem; }
    .wa-big-btn {
      display:inline-block; background:#25d366; color:#fff;
      padding:1rem 2.5rem; border-radius:50px; text-decoration:none;
      font-weight:700; font-size:1rem; margin-top:1rem;
      transition:background 0.2s, transform 0.2s;
    }
    .wa-big-btn:hover { background:#1ebe5d; transform:scale(1.05); }
  </style>
</head>
<body>
<button id="backArrow" onclick="history.back()">⮪</button>
<script src="shared-nav.js"></script>

<div class="booking-hero">
  <h1 data-aos="fade-up">Book Your Dream Trip</h1>
</div>

<section id="booking">
  <div class="booking-container" data-aos="fade-up">
    <h2 class="section-title">Book Your Trip</h2>
    <form id="booking-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 XXXXX XXXXX"/>
      </div>
      <div class="form-group">
        <label for="destination">Destination / Experience</label>
        <select id="destination" name="destination">
          <option value="">— Select a destination —</option>
          <option>Udaipur City Tour</option>
          <option>Jaipur</option>
          <option>Jaisalmer</option>
          <option>Jodhpur</option>
          <option>Kumbhalgarh</option>
          <option>Ranakpur</option>
          <option>Custom Package</option>
        </select>
      </div>
      <div class="form-group">
        <label for="checkin">Check-in Date</label>
        <input type="date" id="checkin" name="checkin"/>
      </div>
      <div class="form-group">
        <label for="checkout">Check-out Date</label>
        <input type="date" id="checkout" name="checkout"/>
      </div>
      <div class="form-group">
        <label for="guests">Number of Guests</label>
        <select id="guests" name="guests">
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5+</option>
        </select>
      </div>
      <button class="btn" type="submit">Submit Booking</button>
    </form>
  </div>
</section>

<div class="contact-strip" data-aos="fade-up">
  <h2>Prefer to Talk Directly?</h2>
  <p><i class="fas fa-phone"></i> &nbsp; +91 98765 43210</p>
  <p><i class="fas fa-envelope"></i> &nbsp; support@safarsathi4u.com</p>
  <p><i class="fas fa-map-marker-alt"></i> &nbsp; Udaipur, Rajasthan, India</p>
  <a href="https://wa.me/919876543210?text=Hello SafarSathi4U! I want to book a trip." class="wa-big-btn" target="_blank">
    <i class="fab fa-whatsapp"></i> &nbsp; Chat on WhatsApp
  </a>
</div>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 1000, once: true });
  document.getElementById('booking-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    alert(`Thank you, ${name}! Your booking request has been submitted. We'll contact you within 24 hours.`);
    this.reset();
  });
  // Set min date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('checkin').min = today;
  document.getElementById('checkout').min = today;
</script>
</body>
</html>
