<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packages — SafarSathi4U</title>
  <link rel="stylesheet" href="safarsathi.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <style>
    .packages-hero {
      height: 100vh; position: relative;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
      background: linear-gradient(135deg, #004d40, #1a3c34);
    }
    .packages-hero::before {
      content:''; position:absolute; inset:0;
      background: url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=1400') center/cover;
      opacity: 0.25;
    }
    .hero-content { position: relative; z-index: 1; }
    .animated-heading { font-family:'Playfair Display',serif; color:#fff; font-size: clamp(2.5rem,6vw,5rem); line-height:1.1; margin-bottom:1rem; }
    .animated-heading span { display:inline-block; opacity:0; animation: wordPop 0.5s forwards; }
    .animated-heading span:nth-child(1){animation-delay:0.1s}
    .animated-heading span:nth-child(2){animation-delay:0.25s}
    .animated-heading span:nth-child(3){animation-delay:0.4s}
    .animated-heading span:nth-child(4){animation-delay:0.55s}
    .animated-heading span:nth-child(5){animation-delay:0.7s}
    @keyframes wordPop { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:none} }
    .letter-animate { font-size:1.2rem; color:rgba(255,255,255,0.8); margin-bottom:2rem; }
    .cta-btn {
      display:inline-block; background:#ffd700; color:#1a1a1a;
      padding:1rem 2.5rem; border-radius:4px; text-decoration:none;
      font-weight:700; font-size:1rem; letter-spacing:0.05em;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(201,168,76,0.5); }
  </style>
</head>
<body>
<button id="backArrow" onclick="history.back()">⮪</button>
<script src="shared-nav.js"></script>

<div class="packages-hero">
  <div class="hero-content">
    <h2 class="animated-heading">
      <span>Explore</span> <span>the</span> <span>Beauty</span> <span>of</span> <span>Udaipur</span>
    </h2>
    <p class="letter-animate">Discover curated travel packages tailored just for you</p>
    <a href="packge.html" class="cta-btn">View All Packages</a>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
