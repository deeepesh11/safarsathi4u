<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adventures — SafarSathi4U</title>
  <link rel="stylesheet" href="safarsathi.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <style>
    .adv-hero {
      height: 100vh; position:relative;
      display:flex; align-items:center; justify-content:center; text-align:center;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1400') center/cover;
    }
    .adv-hero::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    .adv-hero-content { position:relative; z-index:1; max-width:700px; padding:1rem; }
    .adv-hero-content h2 { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.5rem); color:#fff; margin-bottom:1rem; line-height:1.2; }
    .adv-hero-content p { font-size:1.1rem; color:rgba(255,255,255,0.85); line-height:1.8; margin-bottom:2rem; }
    .cta-btn {
      display:inline-block; background:#ffd700; color:#1a1a1a;
      padding:1rem 2.5rem; border-radius:4px; text-decoration:none;
      font-weight:700; font-size:1rem; transition:transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(201,168,76,0.5); }
  </style>
</head>
<body>
<button id="backArrow" onclick="history.back()">⮪</button>
<script src="shared-nav.js"></script>

<section class="adv-hero">
  <div class="adv-hero-content" data-aos="fade-up">
    <h2>Explore Thrilling Adventures in Udaipur</h2>
    <p>Experience the rush! From soaring high above in a hot air balloon to ziplining across the Aravalli Hills, Udaipur is the place for every adventure seeker.</p>
    <a href="adventure.html" class="cta-btn">Discover Adventures</a>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
